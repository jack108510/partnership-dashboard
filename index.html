<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clinic Solutions — Partner Dashboard</title>
<meta name="theme-color" content="#1e3a5f">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--navy:#1e3a5f;--muted:#64748b;--bg:#f4f8ff;--white:#fff;--border:#dbeafe;--green:#16a34a;--amber:#d97706;--red:#dc2626;--green-dim:#f0fdf4;--amber-dim:#fef3c7;--red-dim:#fef2f2;--blue-dim:#eff6ff}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.1rem;font-weight:800}.header h1 span{color:var(--blue)}
.header-actions{display:flex;gap:6px}
.hbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--blue);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
.hbtn:hover{background:var(--blue-dim)}
.hbtn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.hbtn.primary:hover{background:#1d4ed8}

.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:.68rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.tab.active{color:var(--blue);border-bottom:3px solid var(--blue);background:var(--blue-dim)}
.tab .count{display:inline-block;background:var(--blue-dim);color:var(--blue);font-size:.6rem;padding:1px 6px;border-radius:10px;margin-left:4px}

.content{flex:1;padding:16px;overflow-y:auto}
.page{display:none}.page.active{display:block}

.role-bar{display:flex;gap:8px;margin-bottom:16px}
.role-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--navy)}
.role-btn.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}

/* Proposal cards */
.proposal{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.prop-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.prop-title{font-size:.9rem;font-weight:800}
.prop-date{font-size:.68rem;color:var(--muted);margin-top:2px}
.prop-from{font-size:.65rem;color:var(--blue);font-weight:600;margin-top:2px}
.status{font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.s-pending{background:var(--amber-dim);color:var(--amber)}
.s-approved{background:var(--green-dim);color:var(--green)}
.s-rejected{background:var(--red-dim);color:var(--red)}

.prop-body{padding:0 16px 14px}
.prop-detail{font-size:.8rem;color:var(--muted);line-height:1.55;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:12px}
.prop-impact{font-size:.78rem;font-weight:700;color:var(--green);margin-bottom:8px}

.reason{padding:12px 16px;border-top:1px solid var(--border)}
.reason-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.reason-label.red{color:var(--red)}.reason-label.green{color:var(--green)}
.reason-text{font-size:.8rem;color:var(--muted);line-height:1.5}

.response{padding:14px 16px;border-top:1px solid var(--border)}
.resp-text{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;font-family:inherit;resize:vertical;min-height:60px;margin-bottom:8px;outline:none}
.resp-text:focus{border-color:var(--blue)}
.resp-btns{display:flex;gap:8px}
.rbtn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer}
.rbtn-approve{background:var(--green-dim);color:var(--green)}.rbtn-approve:hover{background:#dcfce7}
.rbtn-reject{background:var(--red-dim);color:var(--red)}.rbtn-reject:hover{background:#fee2e2}

/* New proposal form */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.sh{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .2s ease}
.modal h3{font-size:1.05rem;font-weight:800;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.84rem;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}
.btn-submit{background:var(--blue);color:#fff}.btn-submit:hover{background:#1d4ed8}
.btn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.88rem;line-height:1.6}
.empty-icon{font-size:40px;margin-bottom:8px}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(max-width:400px){.tab{font-size:.62rem;padding:10px 4px}}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>Clinic <span>Solutions</span></h1>
  <div class="header-actions">
    <button class="hbtn primary" onclick="openModal()">+ New Suggestion</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('all',this)">All <span class="count" id="cnt-all">0</span></button>
  <button class="tab" onclick="go('tudor',this)">Tudor Glen <span class="count" id="cnt-tudor">0</span></button>
  <button class="tab" onclick="go('river',this)">River Valley <span class="count" id="cnt-river">0</span></button>
  <button class="tab" onclick="go('rosslyn',this)">Rosslyn <span class="count" id="cnt-rosslyn">0</span></button>
</div>

<div class="content page active" id="pg-all">
  <div class="role-bar">
    <button class="role-btn active" onclick="setRole('proposer',this)">Proposer</button>
    <button class="role-btn" onclick="setRole('reviewer',this)">Reviewer</button>
  </div>
  <div id="list-all"></div>
</div>

<div class="content page" id="pg-tudor">
  <div class="role-bar">
    <button class="role-btn active" onclick="setRole('proposer',this)">Proposer</button>
    <button class="role-btn" onclick="setRole('reviewer',this)">Reviewer</button>
  </div>
  <div id="list-tudor"></div>
</div>

<div class="content page" id="pg-river">
  <div class="role-bar">
    <button class="role-btn active" onclick="setRole('proposer',this)">Proposer</button>
    <button class="role-btn" onclick="setRole('reviewer',this)">Reviewer</button>
  </div>
  <div id="list-river"></div>
</div>

<div class="content page" id="pg-rosslyn">
  <div class="role-bar">
    <button class="role-btn active" onclick="setRole('proposer',this)">Proposer</button>
    <button class="role-btn" onclick="setRole('reviewer',this)">Reviewer</button>
  </div>
  <div id="list-rosslyn"></div>
</div>

</div>

<!-- New Suggestion Modal -->
<div class="modal-overlay" id="modal">
<div class="modal">
  <h3>New Suggestion</h3>
  <div class="field"><label>Location</label>
    <select id="m-loc"><option value="all">All Locations</option><option value="tudor">Tudor Glen</option><option value="river">River Valley</option><option value="rosslyn">Rosslyn</option></select></div>
  <div class="field"><label>Title</label><input id="m-title" placeholder="e.g. Cancel Saturday shift for Dr. Lee"/></div>
  <div class="field"><label>Category</label>
    <select id="m-cat"><option value="scheduling">Scheduling</option><option value="pricing">Pricing</option><option value="campaign">Campaign</option><option value="service">New Service</option><option value="expense">Expense</option><option value="staffing">Staffing</option><option value="operations">Operations</option><option value="other">Other</option></select></div>
  <div class="field"><label>Details</label><textarea id="m-detail" placeholder="What's the suggestion, why, and what's the expected outcome..."></textarea></div>
  <div class="field"><label>Impact</label><input id="m-impact" placeholder="e.g. Saves $200/mo, frees up Saturday coverage"/></div>
  <div class="modal-btns">
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn-submit" onclick="submitProposal()">Submit</button>
  </div>
</div>
</div>

<script>
let role='proposer';
let currentTab='all';
let nextId=100;

const DB={
  all:[],tudor:[],river:[],rosslyn:[]
};

function $(id){return document.getElementById(id)}

function go(loc,el){
  currentTab=loc;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('pg-'+loc).classList.add('active');
  el.classList.add('active');
  render(loc);
}

function setRole(r,el){
  role=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render(currentTab);
}

function openModal(){$('modal').classList.add('sh')}
function closeModal(){
  $('modal').classList.remove('sh');
  $('m-title').value='';$('m-detail').value='';$('m-impact').value='';
}

function submitProposal(){
  const loc=$('m-loc').value;
  const title=$('m-title').value.trim();
  const cat=$('m-cat').value;
  const detail=$('m-detail').value.trim();
  const impact=$('m-impact').value.trim();
  if(!title||!detail){alert('Title and details are required');return}

  const prop={id:nextId++,title,cat,detail,impact:impact||'TBD',status:'pending',from:role,date:new Date().toLocaleDateString(),reviewerNote:null};

  DB[loc].unshift(prop);
  closeModal();
  updateCounts();
  go(loc,document.querySelector('.tab'));
}

function respond(loc,id,action){
  const note=prompt(action==='approved'?'Add a note (optional):':'Why are you rejecting this? (required)');
  if(action==='rejected'&&!note)return;
  const prop=DB[loc].find(p=>p.id===id);
  if(!prop)return;
  prop.status=action;
  prop.reviewerNote=note;
  render(loc);
  updateCounts();
}

function render(loc){
  const list=DB[loc];
  const el=$('list-'+loc);
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No suggestions yet.<br/>Tap + New Suggestion to create one.</div>';
    return;
  }

  el.innerHTML=list.map(p=>{
    let h=`<div class="proposal">
      <div class="prop-head">
        <div><div class="prop-title">${p.title}</div><div class="prop-date">${p.cat} · ${p.date}</div><div class="prop-from">From: ${p.from==='proposer'?'Management':'Clinic Staff'}</div></div>
        <span class="status s-${p.status}">${p.status}</span>
      </div>
      <div class="prop-body">
        <div class="prop-detail">${p.detail}</div>
        ${p.impact?`<div class="prop-impact">Impact: ${p.impact}</div>`:''}`;

    if(p.status==='rejected'&&p.reviewerNote){
      h+=`<div class="reason"><div class="reason-label red">Rejected</div><div class="reason-text">${p.reviewerNote}</div></div>`;
    }
    if(p.status==='approved'&&p.reviewerNote){
      h+=`<div class="reason"><div class="reason-label green">Approved</div><div class="reason-text">${p.reviewerNote}</div></div>`;
    }

    if(role==='reviewer'&&p.status==='pending'){
      h+=`<div class="response">
        <textarea class="resp-text" id="resp-${p.id}" placeholder="Your thoughts... (required for rejection)"></textarea>
        <div class="resp-btns">
          <button class="rbtn rbtn-approve" onclick="respond('${loc}',${p.id},'approved')">✓ Approve</button>
          <button class="rbtn rbtn-reject" onclick="respond('${loc}',${p.id},'rejected')">✕ Reject</button>
        </div></div>`;
    }

    h+=`</div></div>`;
    return h;
  }).join('');
}

function updateCounts(){
  ['all','tudor','river','rosslyn'].forEach(loc=>{
    const pending=DB[loc].filter(p=>p.status==='pending').length;
    $('cnt-'+loc).textContent=DB[loc].length;
  });
}

updateCounts();
render('all');
</script>
</body>
</html>
